<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Load Log — Recomp Tracker</title>
<meta name="theme-color" content="#16171A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Load Log">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#16171A;
    --panel:#1F2124;
    --panel-2:#26282C;
    --chalk:#ECE8E1;
    --steel:#9BA1A8;
    --steel-dim:#565B62;
    --line:#2E3034;
    --plate-red:#B8493D;
    --plate-gold:#C89B3C;
    --plate-blue:#3E6E8E;
    --plate-green:#4C8C6B;
    --font-display:'Bebas Neue','Arial Narrow',Impact,sans-serif;
    --font-body:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'IBM Plex Mono','SFMono-Regular',Menlo,monospace;
  }
  *{box-sizing:border-box;}
  [hidden]{display:none !important;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--chalk);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:560px;margin:0 auto;padding:20px 16px 80px;}

  :focus-visible{outline:2px solid var(--plate-gold);outline-offset:2px;}

  header{position:sticky;top:0;background:var(--ink);z-index:10;padding-top:max(16px, env(safe-area-inset-top));padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .brand-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .brand{font-family:var(--font-display);font-size:30px;letter-spacing:2px;line-height:1;color:var(--chalk);}
  .tagline{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--steel);text-transform:uppercase;margin-left:8px;}
  .date-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;}
  .date-nav[hidden]{display:none;}
  .date-nav button{background:none;border:1px solid var(--line);color:var(--chalk);width:30px;height:30px;border-radius:3px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .date-nav button:hover{border-color:var(--steel);}
  #dateLabel{font-family:var(--font-mono);font-size:13px;letter-spacing:1px;min-width:120px;text-align:center;text-transform:uppercase;}
  #todayBtn{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;background:none;border:1px solid var(--plate-gold);color:var(--plate-gold);border-radius:3px;padding:3px 8px;cursor:pointer;width:auto;height:auto;text-transform:uppercase;}
  #signOutBtn{background:none;border:none;color:var(--steel);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:4px 0;}
  #signOutBtn:hover{color:var(--chalk);}
  .header-actions{display:flex;align-items:center;gap:14px;}
  .menu-btn{background:none;border:1px solid var(--line);color:var(--chalk);width:30px;height:30px;border-radius:3px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .menu-btn:hover{border-color:var(--steel);}
  .menu-panel{position:absolute;top:44px;right:16px;background:var(--panel);border:1px solid var(--line);border-radius:6px;box-shadow:0 10px 28px rgba(0,0,0,.45);z-index:20;min-width:180px;overflow:hidden;}
  .menu-item{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);color:var(--chalk);font-family:var(--font-body);font-size:13px;font-weight:500;padding:12px 16px;cursor:pointer;}
  .menu-item:last-child{border-bottom:none;}
  .menu-item:hover{background:var(--panel-2);}
  .menu-item.active{color:var(--plate-gold);font-weight:700;}

  .tabs{display:flex;border-top:1px solid var(--line);}
  .tabs[hidden]{display:none;}
  .tab{flex:1;background:none;border:none;color:var(--steel);font-family:var(--font-body);font-weight:600;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 0 8px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.active{color:var(--chalk);border-bottom-color:var(--plate-gold);}

  .empty{color:var(--steel);font-size:13px;font-style:italic;padding:10px 2px;}
  .mono{font-family:var(--font-mono);}

  /* Auth */
  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-screen[hidden]{display:none;}
  .auth-card{width:100%;max-width:320px;text-align:center;}
  .auth-card .brand{display:block;font-size:38px;}
  .auth-card .tagline{margin-left:0;display:block;margin-bottom:22px;}
  .auth-form{display:flex;flex-direction:column;gap:10px;text-align:left;}
  .auth-toggle{background:none;border:none;color:var(--plate-gold);font-family:var(--font-body);font-size:12.5px;font-weight:600;cursor:pointer;margin-top:14px;}
  .auth-toggle:hover{text-decoration:underline;}
  #authMsg{min-height:18px;}
  #authMsg.error{color:var(--plate-red);font-style:normal;}

  /* Macros */
  .ring-row{display:flex;gap:22px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  .cal-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
  .cal-ring{width:120px;height:120px;transform:rotate(-90deg);}
  .ring-track{fill:none;stroke:var(--panel-2);stroke-width:9;}
  .ring-fill{fill:none;stroke:var(--plate-green);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .4s ease;}
  .cal-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .cal-num{font-size:22px;font-weight:600;}
  .cal-target{font-size:10px;color:var(--steel);margin-top:2px;}
  .macro-bars{flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px;}
  .macro-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .macro-bar-label span:last-child{color:var(--steel);}
  .bar-track{background:var(--panel-2);height:8px;border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
  .bar-fill.protein{background:var(--plate-red);}
  .bar-fill.carbs{background:var(--plate-gold);}
  .bar-fill.fat{background:var(--plate-blue);}

  .ghost-btn{background:none;border:1px solid var(--line);color:var(--chalk);font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.5px;padding:7px 12px;border-radius:3px;cursor:pointer;}
  .ghost-btn:hover{border-color:var(--steel);}
  .targets-btn{margin-bottom:16px;color:var(--steel);}
  .primary-btn{background:var(--plate-green);border:none;color:var(--chalk);font-family:var(--font-body);font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;padding:11px 16px;border-radius:3px;cursor:pointer;width:100%;}
  .primary-btn:hover{filter:brightness(1.08);}
  .primary-btn:disabled{opacity:.6;cursor:default;filter:none;}
  .primary-btn.full{width:100%;margin-top:6px;}

  .text-input,.num-input{background:var(--panel);border:1px solid var(--line);color:var(--chalk);font-family:var(--font-body);font-size:14px;padding:10px;border-radius:3px;width:100%;}
  .text-input::placeholder,.num-input::placeholder{color:var(--steel-dim);}
  .food-form{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;padding:14px;background:var(--panel);border-radius:5px;}
  .food-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .food-grid .num-input{font-family:var(--font-mono);font-size:12px;padding:9px 6px;text-align:center;}
  .name-search{position:relative;}
  .meal-suggest-results{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--panel-2);border:1px solid var(--line);border-radius:4px;max-height:200px;overflow-y:auto;z-index:5;}
  .meal-suggest-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line);}
  .meal-suggest-item:last-child{border-bottom:none;}
  .meal-suggest-item:hover{background:var(--panel);}
  .meal-suggest-name{font-size:13px;font-weight:500;}
  .meal-suggest-meta{font-size:11px;color:var(--steel);margin-top:2px;}

  .saved-meals{margin-bottom:18px;}
  .saved-meals-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .saved-meals-head span{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--steel);}
  .saved-meal-list{display:flex;flex-direction:column;gap:10px;}
  .saved-meal-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .save-meal-check{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--steel);cursor:pointer;}
  .save-meal-check input{width:auto;accent-color:var(--plate-gold);}

  .habit-checkin-btn{width:100%;}
  .habit-log-form{display:flex;gap:8px;margin-bottom:8px;}
  .habit-log-form input{flex:1;}
  .habit-empty-hint{color:var(--steel);font-size:11px;margin-top:2px;}

  .meal-card{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:12px 14px;}
  .meal-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .meal-total{color:var(--chalk);font-size:14px;font-weight:600;margin-bottom:8px;}
  .meal-per-serving-label{color:var(--steel);font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
  .meal-servings{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .meal-servings label{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px;}
  .servings-input{width:64px;font-family:var(--font-mono);text-align:center;padding:6px;}
  .meal-batch-total{color:var(--steel);font-size:11px;}
  .meal-edit-toggle{margin-top:6px;}
  .meal-edit-actions{display:flex;align-items:center;gap:16px;margin-top:6px;}
  .meal-edit-actions .meal-edit-toggle{margin-top:0;}
  .ingredient-list{display:flex;flex-direction:column;}
  .ingredient-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
  .ingredient-row:last-child{border-bottom:none;}
  .ingredient-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ingredient-macros{color:var(--steel);white-space:nowrap;font-size:11px;}

  .ingredient-builder{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
  .ingredient-input-row{background:var(--panel-2);border-radius:4px;padding:10px;}
  .ingredient-input-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .ingredient-input-top .text-input{flex:1;}

  .food-list{display:flex;flex-direction:column;gap:6px;}
  .food-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel-2);border-radius:4px;padding:10px 12px;gap:10px;}
  .food-main{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .food-name{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .food-macros{font-size:11px;color:var(--steel);}
  .icon-btn{background:none;border:none;color:var(--steel);font-size:18px;line-height:1;cursor:pointer;padding:2px 6px;flex-shrink:0;}
  .icon-btn:hover{color:var(--plate-red);}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal[hidden]{display:none;}
  .modal-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:18px;width:100%;max-width:320px;max-height:calc(100vh - 40px);max-height:calc(100dvh - 40px);overflow-y:auto;}
  .modal-label{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .modal-label .num-input{font-family:var(--font-mono);margin-top:2px;}
  .progress-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .progress-head h3{margin:0;font-size:16px;font-weight:600;}

  /* Training */
  .barbell{position:relative;display:flex;justify-content:space-between;align-items:center;margin:10px 4px 22px;padding:0 4px;}
  .bar-line{position:absolute;left:4px;right:4px;top:22px;height:3px;background:var(--line);z-index:0;}
  .plate-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
  .plate{width:44px;height:44px;border-radius:50%;background:var(--panel-2);border:2px solid var(--steel-dim);cursor:pointer;}
  .plate:hover{border-color:var(--steel);}
  .plate.active{background:var(--plate-gold);border-color:var(--plate-gold);box-shadow:0 0 0 3px rgba(200,155,60,.2);}
  .plate-label{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.5px;color:var(--steel);text-transform:uppercase;text-align:center;}

  .day-heading{font-family:var(--font-display);font-size:30px;letter-spacing:1px;margin:0 0 14px;text-align:center;}

  .exercise-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .exercise-card{background:var(--panel-2);border-radius:5px;padding:12px 14px;}
  .exercise-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .exercise-name{font-weight:600;font-size:14px;}
  .exercise-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .link-btn{background:none;border:none;color:var(--plate-gold);font-family:var(--font-body);font-size:11.5px;font-weight:600;cursor:pointer;padding:2px 0;white-space:nowrap;}
  .link-btn:hover{text-decoration:underline;}
  .exercise-sets{font-size:12px;color:var(--steel);margin-top:6px;}

  .exercise-form{background:var(--panel);border-radius:5px;padding:14px;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .sets-builder{display:flex;flex-direction:column;gap:6px;}
  .set-row{display:flex;align-items:center;gap:8px;}
  .set-idx{font-family:var(--font-mono);font-size:11px;color:var(--steel-dim);width:14px;text-align:right;flex-shrink:0;}
  .set-input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--chalk);font-family:var(--font-mono);font-size:13px;padding:8px;border-radius:3px;text-align:center;}
  .set-x{color:var(--steel);font-size:13px;flex-shrink:0;}
  .set-remove{background:none;border:none;color:var(--steel);font-size:16px;cursor:pointer;flex-shrink:0;width:20px;}
  .set-remove:hover{color:var(--plate-red);}
  .form-row{display:flex;gap:10px;align-items:center;}
  .form-row .ghost-btn{flex-shrink:0;}
  .form-row .primary-btn{flex:1;}

  .progress-panel{background:var(--panel);border-radius:6px;padding:16px;margin-top:6px;border:1px solid var(--line);}
  .sparkline{width:100%;height:auto;display:block;margin-bottom:10px;}
  .table-scroll{overflow-x:auto;}
  .progress-table{width:100%;border-collapse:collapse;font-size:12px;}
  .progress-table th{text-align:left;color:var(--steel);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;border-bottom:1px solid var(--line);}
  .progress-table td{padding:6px;border-bottom:1px solid var(--line);}
  .progress-table td.mono{font-family:var(--font-mono);font-size:11.5px;}
  .trend{text-align:center;font-weight:700;}
  .trend.up{color:var(--plate-green);}
  .trend.down{color:var(--plate-red);}
  .trend.flat{color:var(--steel);}

  /* Calendar */
  .cal-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;}
  .cal-nav button{background:none;border:1px solid var(--line);color:var(--chalk);width:30px;height:30px;border-radius:3px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cal-nav button:hover{border-color:var(--steel);}
  #calMonthLabel{font-family:var(--font-mono);font-size:13px;letter-spacing:1px;min-width:130px;text-align:center;text-transform:uppercase;}
  .cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;font-size:11px;color:var(--steel);}
  .cal-legend-item{display:flex;align-items:center;gap:5px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px;}
  .cal-dow{font-family:var(--font-mono);font-size:10px;color:var(--steel);text-align:center;padding-bottom:4px;text-transform:uppercase;}
  .cal-cell{aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:4px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:2px;cursor:pointer;}
  .cal-cell:hover{border-color:var(--steel);}
  .cal-cell.empty-cell{visibility:hidden;cursor:default;}
  .cal-cell.today{border-color:var(--plate-gold);}
  .cal-cell.selected{background:var(--panel-2);border-color:var(--chalk);}
  .cal-day-num{font-family:var(--font-mono);font-size:12px;}
  .cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .cal-cell .cal-dot{margin-top:1px;}
  .cal-cell-total{font-family:var(--font-mono);font-size:9px;color:var(--steel);}
  .cal-detail{background:var(--panel);border-radius:6px;padding:16px;border:1px solid var(--line);}
  .cal-detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-detail-head h3{margin:0;font-size:16px;font-weight:600;}
  .cal-detail-split{font-size:12px;color:var(--steel);margin-bottom:12px;}
  .cal-detail-macros{margin-bottom:14px;font-size:12.5px;}
  .cal-habits{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .cal-habits-label{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .cal-exercise-row{font-size:12.5px;margin-bottom:6px;}
  .cal-exercise-row .mono{color:var(--steel);}

  /* Stats */
  .stats-range{display:flex;gap:8px;margin-bottom:18px;}
  .stats-range button{flex:1;background:none;border:1px solid var(--line);color:var(--steel);font-family:var(--font-body);font-weight:600;font-size:12px;letter-spacing:.5px;padding:8px 0;border-radius:3px;cursor:pointer;}
  .stats-range button.active{color:var(--chalk);border-color:var(--plate-gold);}
  .stats-section{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:14px;}
  .stats-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .stats-section-head h3{margin:0;font-size:14px;font-weight:600;}
  .stats-section-head span{color:var(--steel);font-size:11.5px;}
  .stats-exercise-panel{margin-top:12px;}
  #statsExerciseSelect{margin-top:2px;}

  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);color:var(--chalk);padding:9px 16px;border-radius:5px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:100;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.error{border-color:var(--plate-red);color:var(--plate-red);}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }

  @media (max-width:380px){
    .food-grid{grid-template-columns:repeat(2,1fr);}
    .plate{width:38px;height:38px;}
    .day-heading{font-size:26px;}
  }
</style>
</head>
<body>
<div id="authScreen" class="auth-screen" hidden>
  <div class="auth-card">
    <span class="brand">LOAD LOG</span>
    <span class="tagline">recomp tracker</span>
    <form id="authForm" class="auth-form">
      <input type="email" name="email" placeholder="Email" class="text-input" required autocomplete="email">
      <input type="password" name="password" placeholder="Password" class="text-input" required autocomplete="current-password" minlength="6">
      <button type="submit" class="primary-btn full" id="authSubmitBtn">Sign in</button>
    </form>
    <button type="button" id="authToggle" class="auth-toggle">Need an account? Sign up</button>
    <p id="authMsg" class="empty"></p>
  </div>
</div>
<div id="app" hidden>
  <header>
    <div class="brand-row">
      <div><span class="brand">LOAD LOG</span><span class="tagline">recomp tracker</span></div>
      <div class="header-actions">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Menu" aria-haspopup="true">☰</button>
        <button id="signOutBtn" type="button">Sign out</button>
      </div>
      <div id="menuPanel" class="menu-panel" hidden>

<script>
(function(){
  "use strict";

  const SUPABASE_URL = 'https://lkunrqjtmbuzmekgkpyt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6apH0Qf2Xo783YtmBgnLOQ_rMsM1FVt';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DAY_LABELS = ['Back & Biceps','Legs & Glutes','Shoulders','Legs & Glutes','Abs','Legs & Glutes','Rest Day'];
  const DAY_SHORT  = ['Back/Bi','Legs','Shoulders','Legs','Abs','Legs','Rest'];
  const DAY_COLOR  = ['plate-red','plate-blue','plate-gold','plate-blue','plate-green','plate-blue','steel-dim'];
  const NUM_DAYS = DAY_LABELS.length;
  const CAL_LEGEND = [
    {label:'Back & Biceps', color:'plate-red'},
    {label:'Legs & Glutes', color:'plate-blue'},
    {label:'Shoulders', color:'plate-gold'},
    {label:'Abs', color:'plate-green'},
    {label:'Rest Day', color:'steel-dim'}
  ];

  let userId = null;
  let authMode = 'signin';
  let currentDate = startOfDay(new Date());
  let activeTab = 'macros';
  let currentPage = 'daily';
  let targets = {calories:1800, protein:125, carbs:210, fat:50};
  let macroDay = {entries:[]};
  let habits = [];
  let habitDay = {};
  let workoutDay = {dayIndex:0, exercises:[]};
  let lastDayIndex = -1;
  let exerciseIndex = [];
  let pendingSets = [{weight:'',reps:''}];
  let calMonthDate = startOfMonth(currentDate);
  let calSelectedKey = null;
  let calData = {};
  let calInitialized = false;
  let savedMeals = [];
  let pendingIngredients = [{name:'',cal:'',protein:'',carbs:'',fat:''}];
  let addIngredientMealId = null;
  let expandedMealIds = new Set();
  let statsDays = 30;
  let statsData = null;
  let statsExercise = null;
  let bodyEntries = [];

  // ---------- date helpers ----------
  function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
  function formatKey(d){
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }
  function currentKey(){ return formatKey(currentDate); }
  function formatShort(dateLike){
    const d = typeof dateLike === 'string' ? new Date(dateLike + 'T00:00:00') : dateLike;
    return d.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  }
  function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
  function daysInMonth(y, m){ return new Date(y, m+1, 0).getDate(); }

  // ---------- misc helpers ----------
  function fmt(n){ return Math.round(n||0).toLocaleString(); }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function showToast(msg, isError){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
  }

  // ---------- auth ----------
  function showAuthScreen(){
    document.getElementById('authScreen').hidden = false;
    document.getElementById('app').hidden = true;
  }
  function hideAuthScreen(){
    document.getElementById('authScreen').hidden = true;
    document.getElementById('app').hidden = false;
  }
  function setAuthMode(mode){
    authMode = mode;
    document.getElementById('authSubmitBtn').textContent = mode === 'signin' ? 'Sign in' : 'Create account';
    document.getElementById('authToggle').textContent = mode === 'signin' ? 'Need an account? Sign up' : 'Already have an account? Sign in';
    document.getElementById('authMsg').textContent = '';
    document.getElementById('authMsg').className = 'empty';
  }
  function setAuthMsg(msg, isError){
    const el = document.getElementById('authMsg');
    el.textContent = msg;
    el.className = isError ? 'empty error' : 'empty';
  }

  async function onSignedIn(user){
    userId = user.id;
    hideAuthScreen();
    document.getElementById('macrosView').innerHTML = '<p class="empty">Loading…</p>';
    document.getElementById('trainingView').innerHTML = '<p class="empty">Loading…</p>';
    await ensureSettingsRow();
    await loadExerciseIndex();
    await loadSavedMeals();
    await loadHabits();
    await loadDateData();
    render();
  }

  sb.auth.onAuthStateChange(function(event, session){
    if(event === 'SIGNED_OUT'){
      userId = null;
      showAuthScreen();
    }
  });

  async function initApp(){
    const { data } = await sb.auth.getSession();
    if(data && data.session){
      await onSignedIn(data.session.user);
    } else {
      showAuthScreen();
    }
  }

  // ---------- data loading ----------
  async function ensureSettingsRow(){
    const { data, error } = await sb.from('settings').select('targets,last_day_index').eq('user_id', userId).maybeSingle();
    if(error){ showToast('Could not load settings', true); return; }
    if(data){
      targets = data.targets;
      lastDayIndex = data.last_day_index;
    } else {
      const { error: insErr } = await sb.from('settings').insert({user_id: userId, targets: targets, last_day_index: -1});
      if(insErr) showToast('Could not save — try again', true);
    }
  }
  async function loadExerciseIndex(){
    const { data, error } = await sb.from('exercises').select('name').eq('user_id', userId);
    if(error){ exerciseIndex = []; return; }
    exerciseIndex = Array.from(new Set((data||[]).map(function(r){ return r.name; }))).sort(function(a,b){ return a.localeCompare(b); });
  }
  async function loadDateData(){
    const key = currentKey();
    const [foodRes, workoutRes, exRes, habitEntriesRes] = await Promise.all([
      sb.from('food_entries').select('*').eq('user_id', userId).eq('day', key).order('created_at', {ascending:true}),
      sb.from('workout_days').select('*').eq('user_id', userId).eq('day', key).maybeSingle(),
      sb.from('exercises').select('*').eq('user_id', userId).eq('day', key).order('created_at', {ascending:true}),
      sb.from('habit_entries').select('*').eq('user_id', userId).eq('day', key).order('created_at', {ascending:true})
    ]);
    macroDay = { entries: (foodRes.data || []).map(function(r){
      return {id:r.id, name:r.name, cal:r.cal, protein:r.protein, carbs:r.carbs, fat:r.fat};
    }) };
    const dayIndex = workoutRes.data ? workoutRes.data.day_index : (lastDayIndex+1+NUM_DAYS)%NUM_DAYS;
    workoutDay = { dayIndex: dayIndex, exercises: (exRes.data || []).map(function(r){
      return {id:r.id, name:r.name, sets:r.sets};
    }) };
    const byHabit = {};
    (habitEntriesRes.data || []).forEach(function(r){
      if(!byHabit[r.habit_id]) byHabit[r.habit_id] = [];
      byHabit[r.habit_id].push({id:r.id, amount:r.amount});
    });
    habitDay = byHabit;
    pendingSets = [{weight:'',reps:''}];
  }

  // ---------- mutations ----------
  async function addFood(entry){
    const { data, error } = await sb.from('food_entries').insert({
      user_id: userId, day: currentKey(), name: entry.name, cal: entry.cal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat
    }).select().single();
    if(error){ showToast('Could not save — try again', true); return; }
    macroDay.entries = macroDay.entries || [];
    macroDay.entries.push({id:data.id, name:data.name, cal:data.cal, protein:data.protein, carbs:data.carbs, fat:data.fat});
    renderMacros();
  }
  async function deleteFood(id){
    const prev = macroDay.entries;
    macroDay.entries = (macroDay.entries||[]).filter(function(x){ return x.id !== id; });
    renderMacros();
    const { error } = await sb.from('food_entries').delete().eq('id', id).eq('user_id', userId);
    if(error){ macroDay.entries = prev; renderMacros(); showToast('Could not delete — try again', true); }
  }
  async function loadHabits(){
    const { data, error } = await sb.from('habits').select('*').eq('user_id', userId).order('created_at', {ascending:true});
    if(error){ habits = []; return; }
    habits = data || [];
  }
  async function addHabit(name, unit){
    const { data, error } = await sb.from('habits').insert({user_id: userId, name: name, unit: unit || null}).select().single();
    if(error){ showToast('Could not save — try again', true); return; }
    habits.push(data);
    renderHabits();
  }
  async function deleteHabit(id){
    const prev = habits;
    habits = habits.filter(function(h){ return h.id !== id; });
    delete habitDay[id];
    renderHabits();
    const { error } = await sb.from('habits').delete().eq('id', id).eq('user_id', userId);
    if(error){ habits = prev; renderHabits(); showToast('Could not delete — try again', true); }
  }
  async function logHabit(habitId, amount){
    const { data, error } = await sb.from('habit_entries').insert({
      user_id: userId, habit_id: habitId, day: currentKey(), amount: amount
    }).select().single();
    if(error){ showToast('Could not save — try again', true); return; }
    if(!habitDay[habitId]) habitDay[habitId] = [];
    habitDay[habitId].push({id:data.id, amount:data.amount});
    renderHabits();
  }
  async function deleteHabitEntry(habitId, entryId){
    const prev = habitDay[habitId];
    habitDay[habitId] = (habitDay[habitId]||[]).filter(function(e){ return e.id !== entryId; });
    renderHabits();
    const { error } = await sb.from('habit_entries').delete().eq('id', entryId).eq('user_id', userId);
    if(error){ habitDay[habitId] = prev; renderHabits(); showToast('Could not delete — try again', true); }
  }
  function toggleCheckinHabit(habitId){
    const entries = habitDay[habitId] || [];
    if(entries.length){ deleteHabitEntry(habitId, entries[0].id); }
    else { logHabit(habitId, 1); }
  }
  async function saveTargets(t){
    targets = t;
    const { error } = await sb.from('settings').update({targets: t, updated_at: new Date().toISOString()}).eq('user_id', userId);
    if(error) showToast('Could not save — try again', true);
  }
  async function selectDay(idx){
    workoutDay.dayIndex = idx;
    pendingSets = [{weight:'',reps:''}];
    renderTraining();
    const { error } = await sb.from('workout_days').upsert({user_id: userId, day: currentKey(), day_index: idx}, {onConflict:'user_id,day'});
    if(error) showToast('Could not save — try again', true);
  }
  async function saveExercise(name, sets){
    const { data, error } = await sb.from('exercises').insert({
      user_id: userId, day: currentKey(), name: name, sets: sets
    }).select().single();
    if(error){ showToast('Could not save — try again', true); return; }
    workoutDay.exercises = workoutDay.exercises || [];
    workoutDay.exercises.push({id:data.id, name:data.name, sets:data.sets});
    renderTraining();
    if(exerciseIndex.indexOf(name) === -1){
      exerciseIndex.push(name);
      exerciseIndex.sort(function(a,b){ return a.localeCompare(b); });
    }
    lastDayIndex = workoutDay.dayIndex;
    await sb.from('settings').update({last_day_index: lastDayIndex}).eq('user_id', userId);
  }
  async function deleteExercise(id){
    const prev = workoutDay.exercises;
    workoutDay.exercises = (workoutDay.exercises||[]).filter(function(e){ return e.id !== id; });
    renderTraining();
    const { error } = await sb.from('exercises').delete().eq('id', id).eq('user_id', userId);
    if(error){ workoutDay.exercises = prev; renderTraining(); showToast('Could not delete — try again', true); }
  }
  async function openProgress(name){
    const panel = document.getElementById('progressPanel');
    if(panel) panel.hidden = false;
    renderProgressPanel(name, null, true);
    const entries = await loadExerciseHistory(name);
    renderProgressPanel(name, entries);
  }
  async function loadSavedMeals(){
    const [mealsRes, ingRes] = await Promise.all([
      sb.from('saved_foods').select('*').eq('user_id', userId).order('name', {ascending:true}),
      sb.from('saved_meal_ingredients').select('*').eq('user_id', userId).order('created_at', {ascending:true})
    ]);
    if(mealsRes.error){ savedMeals = []; return; }
    const ingByMeal = {};
    (ingRes.data || []).forEach(function(i){
      if(!ingByMeal[i.meal_id]) ingByMeal[i.meal_id] = [];
      ingByMeal[i.meal_id].push(i);
    });
    savedMeals = (mealsRes.data || []).map(function(m){
      return Object.assign({}, m, {ingredients: ingByMeal[m.id] || []});
    });
  }
  function mealTotals(m){
    if(m.ingredients && m.ingredients.length){
      return m.ingredients.reduce(function(acc, i){
        acc.cal += i.cal||0; acc.protein += i.protein||0; acc.carbs += i.carbs||0; acc.fat += i.fat||0;
        return acc;
      }, {cal:0, protein:0, carbs:0, fat:0});
    }
    return {cal: m.cal||0, protein: m.protein||0, carbs: m.carbs||0, fat: m.fat||0};
  }
  function mealPerServing(m){
    const t = mealTotals(m);
    const servings = m.servings || 1;
    return {cal: t.cal/servings, protein: t.protein/servings, carbs: t.carbs/servings, fat: t.fat/servings};
  }
  async function updateMealServings(mealId, servings){
    const meal = savedMeals.find(function(m){ return m.id === mealId; });
    if(!meal) return;
    const prev = meal.servings;
    meal.servings = servings;
    renderMeals();
    const { error } = await sb.from('saved_foods').update({servings: servings}).eq('id', mealId).eq('user_id', userId);
    if(error){ meal.servings = prev; renderMeals(); showToast('Could not update servings — try again', true); }
  }
  function toggleMealExpanded(id){
    if(expandedMealIds.has(id)) expandedMealIds.delete(id);
    else expandedMealIds.add(id);
    renderMeals();
  }
  async function addSavedMeal(name, ingredients, servings){
    const { data, error } = await sb.from('saved_foods').insert({user_id: userId, name: name, servings: servings || 1}).select().single();
    if(error){ showToast('Could not save meal — try again', true); return; }
    const rows = ingredients.map(function(ing){
      return {meal_id: data.id, user_id: userId, name: ing.name, cal: ing.cal, protein: ing.protein, carbs: ing.carbs, fat: ing.fat};
    });
    const { data: ingData, error: ingErr } = await sb.from('saved_meal_ingredients').insert(rows).select();
    if(ingErr) showToast('Meal saved, but ingredients failed to save', true);
    const meal = Object.assign({}, data, {ingredients: ingErr ? [] : (ingData || [])});
    savedMeals.push(meal);
    savedMeals.sort(function(a,b){ return a.name.localeCompare(b.name); });
    if(currentPage === 'meals') renderMeals();
  }
  async function deleteSavedMeal(id){
    const prev = savedMeals;
    savedMeals = savedMeals.filter(function(m){ return m.id !== id; });
    renderMeals();
    const { error } = await sb.from('saved_foods').delete().eq('id', id).eq('user_id', userId);
    if(error){ savedMeals = prev; renderMeals(); showToast('Could not delete — try again', true); }
  }
  async function addIngredientToMeal(mealId, ing){
    const { data, error } = await sb.from('saved_meal_ingredients').insert({
      meal_id: mealId, user_id: userId, name: ing.name, cal: ing.cal, protein: ing.protein, carbs: ing.carbs, fat: ing.fat
    }).select().single();
    if(error){ showToast('Could not add ingredient — try again', true); return; }
    const meal = savedMeals.find(function(m){ return m.id === mealId; });
    if(meal){ meal.ingredients = meal.ingredients || []; meal.ingredients.push(data); }
    renderMeals();
  }
  async function deleteIngredient(mealId, ingId){
    const meal = savedMeals.find(function(m){ return m.id === mealId; });
    if(!meal) return;
    const prev = meal.ingredients;
    meal.ingredients = (meal.ingredients||[]).filter(function(i){ return i.id !== ingId; });
    renderMeals();
    const { error } = await sb.from('saved_meal_ingredients').delete().eq('id', ingId).eq('user_id', userId);
    if(error){ meal.ingredients = prev; renderMeals(); showToast('Could not delete — try again', true); }
  }
  async function quickAddSavedMeal(id){
    const m = savedMeals.find(function(x){ return x.id === id; });
    if(!m) return;
    const p = mealPerServing(m);
    await addFood({name: m.name, cal: p.cal, protein: p.protein, carbs: p.carbs, fat: p.fat});
    showToast('Logged');
  }
  async function loadCalendarMonth(){
    const y = calMonthDate.getFullYear(), m = calMonthDate.getMonth();
    const startKey = formatKey(new Date(y, m, 1));
    const endKey = formatKey(new Date(y, m, daysInMonth(y, m)));
    const [foodRes, workoutRes, exRes, habitRes] = await Promise.all([
      sb.from('food_entries').select('day,cal').eq('user_id', userId).gte('day', startKey).lte('day', endKey),
      sb.from('workout_days').select('day,day_index').eq('user_id', userId).gte('day', startKey).lte('day', endKey),
      sb.from('exercises').select('day,name,sets').eq('user_id', userId).gte('day', startKey).lte('day', endKey).order('created_at', {ascending:true}),
      sb.from('habit_entries').select('day,habit_id,amount').eq('user_id', userId).gte('day', startKey).lte('day', endKey)
    ]);
    const data = {};
    function bucket(key){
      if(!data[key]) data[key] = {cal:0, dayIndex:null, exercises:[], habits:{}};
      return data[key];
    }
    (foodRes.data||[]).forEach(function(r){ bucket(r.day).cal += (r.cal||0); });
    (workoutRes.data||[]).forEach(function(r){ bucket(r.day).dayIndex = r.day_index; });
    (exRes.data||[]).forEach(function(r){ bucket(r.day).exercises.push({name:r.name, sets:r.sets}); });
    (habitRes.data||[]).forEach(function(r){
      const b = bucket(r.day);
      b.habits[r.habit_id] = (b.habits[r.habit_id] || 0) + (r.amount||0);
    });
    calData = data;
  }
  async function changeCalMonth(delta){
    calMonthDate = new Date(calMonthDate.getFullYear(), calMonthDate.getMonth()+delta, 1);
    calSelectedKey = null;
    await loadCalendarMonth();
    renderCalendar();
  }
  function selectCalDay(key){
    calSelectedKey = key;
    renderCalendar();
  }
  async function gotoCalDay(){
    if(!calSelectedKey) return;
    currentDate = new Date(calSelectedKey + 'T00:00:00');
    activeTab = 'macros';
    currentPage = 'daily';
    await loadDateData();
    render();
  }

  // ---------- stats ----------
  async function loadStatsCalories(){
    const end = startOfDay(new Date());
    const start = new Date(end.getTime() - (statsDays-1)*86400000);
    const startKey = formatKey(start), endKey = formatKey(end);
    const { data, error } = await sb.from('food_entries').select('day,cal,protein,carbs,fat').eq('user_id', userId).gte('day', startKey).lte('day', endKey);
    const byDay = {};
    (data||[]).forEach(function(r){
      if(!byDay[r.day]) byDay[r.day] = {cal:0, protein:0, carbs:0, fat:0};
      byDay[r.day].cal += r.cal||0; byDay[r.day].protein += r.protein||0; byDay[r.day].carbs += r.carbs||0; byDay[r.day].fat += r.fat||0;
    });
    const days = [];
    for(let i=0;i<statsDays;i++){ days.push(formatKey(new Date(start.getTime() + i*86400000))); }
    statsData = {
      days: days,
      cal: days.map(function(k){ return byDay[k] ? byDay[k].cal : 0; }),
      protein: days.map(function(k){ return byDay[k] ? byDay[k].protein : 0; }),
      carbs: days.map(function(k){ return byDay[k] ? byDay[k].carbs : 0; }),
      fat: days.map(function(k){ return byDay[k] ? byDay[k].fat : 0; })
    };
  }
  function statsAvg(values){
    const nonzeroOrAll = values;
    if(!nonzeroOrAll.length) return 0;
    return nonzeroOrAll.reduce(function(a,b){ return a+b; }, 0) / nonzeroOrAll.length;
  }
  function statChartHtml(title, values, color){
    return '<div class="stats-section">' +
      '<div class="stats-section-head"><h3>' + escapeHtml(title) + '</h3><span class="mono">avg ' + fmt(statsAvg(values)) + '</span></div>' +
      renderSparkline(values, {color: color, dots:false, emptyMsg:'Not enough data yet'}) +
    '</div>';
  }
  async function renderStats(){
    const el = document.getElementById('statsView');
    el.innerHTML = '<p class="empty">Loading…</p>';
    await loadStatsCalories();
    const rangeHtml = '<div class="stats-range">' +
      [7,30,90].map(function(d){
        return '<button type="button" class="' + (statsDays===d?'active':'') + '" data-stats-range="' + d + '">' + d + 'D</button>';
      }).join('') +
    '</div>';

  // ---------- body stats ----------
  async function loadBodyStats(){
    const { data, error } = await sb.from('body_stats').select('*').eq('user_id', userId).order('day', {ascending:true});
    if(error){ bodyEntries = []; return; }
    bodyEntries = data || [];
  }
  async function saveBodyStat(entry){
    const { data, error } = await sb.from('body_stats').upsert({
      user_id: userId, day: entry.day, weight: entry.weight, body_fat_pct: entry.bodyFatPct, bmi: entry.bmi, muscle_mass: entry.muscleMass
    }, {onConflict:'user_id,day'}).select().single();
    if(error){ showToast('Could not save — try again', true); return; }
    bodyEntries = bodyEntries.filter(function(e){ return e.day !== data.day; });
    bodyEntries.push(data);
    bodyEntries.sort(function(a,b){ return a.day.localeCompare(b.day); });
    renderBody();
    showToast('Saved');
  }
  async function deleteBodyStat(id){
    const prev = bodyEntries;
    bodyEntries = bodyEntries.filter(function(e){ return e.id !== id; });
    renderBody();
    const { error } = await sb.from('body_stats').delete().eq('id', id).eq('user_id', userId);
    if(error){ bodyEntries = prev; renderBody(); showToast('Could not delete — try again', true); }
  }

    return '<div class="progress-head"><h3>' + escapeHtml(name) + '</h3><button type="button" id="closeProgress" class="icon-btn" aria-label="Close">×</button></div>';
  }
  function renderSparkline(values, opts){
    opts = opts || {};
    const color = opts.color || 'var(--plate-gold)';
    const showDots = opts.dots !== false;
    const emptyMsg = opts.emptyMsg || 'Need more data for a trend line';
    const w=280,h=76,pad=10;
    if(values.length<2){
      return '<svg class="sparkline" viewBox="0 0 ' + w + ' ' + h + '"><text x="' + (w/2) + '" y="' + (h/2) + '" text-anchor="middle" font-size="11" fill="var(--steel)">' + escapeHtml(emptyMsg) + '</text></svg>';
    }
    const min = Math.min.apply(null, values), max = Math.max.apply(null, values);
    const range = (max-min) || 1;
    const pts = values.map(function(v,i){
      const x = pad + (i*(w-2*pad)/(values.length-1));
      const y = h-pad - ((v-min)/range)*(h-2*pad);
      return [x,y];
    });
    const path = pts.map(function(p,i){ return (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ');
    const dots = showDots ? pts.map(function(p){ return '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="' + color + '"/>'; }).join('') : '';
    return '<svg class="sparkline" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
      dots +
      '<text x="' + pad + '" y="' + (h-2) + '" font-size="9" fill="var(--steel)">' + fmt(min) + '</text>' +
      '<text x="' + (w-pad) + '" y="' + (h-2) + '" font-size="9" fill="var(--steel)" text-anchor="end">' + fmt(max) + '</text>' +
    '</svg>';
  }
  function exerciseHistoryBodyHtml(name, entries){
    if(!entries || entries.length===0){
      return '<p class="empty">No history yet for ' + escapeHtml(name) + ' — log it again on a future session to start tracking trend.</p>';
    }
    const sorted = entries.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
    const spark = renderSparkline(sorted.map(function(e){ return e.topWeight; }));
    const reversed = sorted.slice().reverse();
    const rows = reversed.map(function(e,i){
      const prev = reversed[i+1];
      let trend = '–', trendClass = 'flat';
      if(prev){
        if(e.topWeight > prev.topWeight){ trend = '▲'; trendClass = 'up'; }
        else if(e.topWeight < prev.topWeight){ trend = '▼'; trendClass = 'down'; }
      }
      const setsStr = e.sets.map(function(s){ return s.weight + '×' + s.reps; }).join(', ');
      return '<tr><td>' + formatShort(e.date) + '</td><td class="mono">' + setsStr + '</td><td class="mono">' + fmt(e.topWeight) + '</td><td class="trend ' + trendClass + '">' + trend + '</td></tr>';
    }).join('');
    return spark +
      '<table class="progress-table"><thead><tr><th>Date</th><th>Sets</th><th>Top</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }
  async function loadExerciseHistory(name){
    const { data, error } = await sb.from('exercises').select('day,sets').eq('user_id', userId).eq('name', name).order('day', {ascending:true});
    if(error) return [];
    return (data||[]).map(function(r){
      let topWeight = 0;
      (r.sets||[]).forEach(function(s){ if(s.weight > topWeight) topWeight = s.weight; });
      return {date: r.day, sets: r.sets, topWeight: topWeight};
    });
  }
  function renderProgressPanel(name, entries, loading){
    const panel = document.getElementById('progressPanel');
    if(!panel) return;
    panel.hidden = false;
    if(loading){
      panel.innerHTML = progressHeaderHtml(name) + '<p class="empty">Loading…</p>';
      return;

    panel.innerHTML = progressHeaderHtml(name) + exerciseHistoryBodyHtml(name, entries);
  }

    const habitsHtml = habits.length ? '<div class="cal-habits"><div class="cal-habits-label">Habits</div>' + habits.map(function(h){
      const val = (info.habits && info.habits[h.id]) || 0;
      const statusStr = !h.unit ? (val > 0 ? '✓ done' : '—') : (val > 0 ? fmt(val) + ' ' + escapeHtml(h.unit) : '—');
      return '<div class="cal-exercise-row">' + escapeHtml(h.name) + ' <span class="mono">' + statusStr + '</span></div>';

      '<div class="cal-detail-split">' + escapeHtml(splitLabel) + '</div>' +

  function renderCalendar(){
    const el = document.getElementById('calendarView');
    const y = calMonthDate.getFullYear(), m = calMonthDate.getMonth();
    const monthLabel = calMonthDate.toLocaleDateString(undefined, {month:'long', year:'numeric'});
    const firstDow = new Date(y, m, 1).getDay();
    const totalDays = daysInMonth(y, m);
    const todayKey = formatKey(startOfDay(new Date()));

    let cells = '';
    for(let i=0; i<firstDow; i++){
      cells += '<div class="cal-cell empty-cell"></div>';
    }
    for(let d=1; d<=totalDays; d++){
      const key = formatKey(new Date(y, m, d));
      const info = calData[key];
      const classes = ['cal-cell'];
      if(key === todayKey) classes.push('today');
      if(key === calSelectedKey) classes.push('selected');
      const dot = (info && info.dayIndex !== null && info.dayIndex !== undefined)
        ? '<span class="cal-dot" style="background:var(--' + DAY_COLOR[info.dayIndex] + ')"></span>' : '';
      const calTotal = (info && info.cal) ? '<span class="cal-cell-total mono">' + fmt(info.cal) + '</span>' : '';
      cells += '<div class="' + classes.join(' ') + '" data-cal-day="' + key + '">' +
        '<span class="cal-day-num">' + d + '</span>' + dot + calTotal +
      '</div>';
    }

    const dowHtml = ['S','M','T','W','T','F','S'].map(function(d){ return '<div class="cal-dow">' + d + '</div>'; }).join('');
    const legendHtml = '<div class="cal-legend">' + CAL_LEGEND.map(function(l){
      return '<span class="cal-legend-item"><span class="cal-dot" style="background:var(--' + l.color + ')"></span>' + l.label + '</span>';
    }).join('') + '</div>';

    el.innerHTML =
      '<div class="cal-nav">' +
        '<button type="button" id="calPrevMonth" aria-label="Previous month">‹</button>' +
        '<span id="calMonthLabel">' + monthLabel + '</span>' +
        '<button type="button" id="calNextMonth" aria-label="Next month">›</button>' +
      '</div>' +
      legendHtml +
      '<div class="cal-grid">' + dowHtml + cells + '</div>' +
      '<div id="calDetail">' + calDetailHtml() + '</div>';
  }

      const validSets = pendingSets
        .filter(function(s){ return s.weight!=='' && s.reps!=='' && !isNaN(s.weight) && !isNaN(s.reps); })
        .map(function(s){ return {weight: parseFloat(s.weight), reps: parseInt(s.reps,10)}; });
      if(!name || validSets.length===0){ showToast('Add an exercise name and at least one complete set', true); return; }
      saveExercise(name, validSets).then(function(){
        showToast('Exercise logged');
      });
      return;
    }
  });

  // ---------- init ----------
  setAuthMode('signin');
  initApp();

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
